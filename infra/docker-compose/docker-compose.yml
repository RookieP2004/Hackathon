name: aegis-ai

# Local development environment — ARCHITECTURE.md §25.4. One command (`make up`)
# brings up every infra dependency and all 14 backend services. The frontend runs
# outside Docker via `make web` for fast HMR (ARCHITECTURE.md §7.1's dev-experience note).

x-service-base: &service-base
  env_file:
    - ../../.env
  environment:
    # .env's DATABASE_URL/NEO4J_URI/REDIS_URL/etc. point at localhost, which is correct
    # for the make web / host-side dev path (README's Quickstart) but not for containers
    # on the aegis-net bridge network -- override with the compose service names here.
    POSTGRES_HOST: postgres
    DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-aegis}:${POSTGRES_PASSWORD:-changeme_local_only}@postgres:5432/${POSTGRES_DB:-aegis}
    NEO4J_HOST: neo4j
    NEO4J_URI: bolt://neo4j:7687
    REDIS_HOST: redis
    REDIS_URL: redis://redis:6379/0
    CELERY_BROKER_URL: redis://redis:6379/1
    CELERY_RESULT_BACKEND: redis://redis:6379/2
    KAFKA_BROKERS: redpanda:9092
    KAFKA_SCHEMA_REGISTRY_URL: http://redpanda:8081
    MQTT_BROKER_HOST: mosquitto
    # Same problem, same fix, for service-to-service calls: each service's config.py
    # defaults these to localhost:<host-port> (correct for host-side dev), but inside
    # a container "localhost" means that container itself -- point them at the other
    # containers' compose service names on their internal port (every service listens
    # on 8000 internally regardless of its host-mapped port).
    IOT_SIMULATOR_WS_URL: ws://iot-simulator:8000/ws/telemetry
    IOT_SIMULATOR_URL: http://iot-simulator:8000
    NOTIFICATION_SERVICE_URL: http://notification-service:8000
    PREDICTIVE_RISK_ENGINE_URL: http://predictive-risk-engine:8000
    KNOWLEDGE_GRAPH_URL: http://knowledge-graph:8000
    COMPUTER_VISION_URL: http://computer-vision:8000
    RAG_SERVICE_URL: http://rag-service:8000
    INCIDENT_SERVICE_URL: http://incident-service:8000
  depends_on:
    postgres:
      condition: service_healthy
    redis:
      condition: service_healthy
  networks:
    - aegis-net
  restart: unless-stopped

services:
  # ---------------------------------------------------------------------------
  # Infrastructure — DATABASE_SCHEMA.md, KNOWLEDGE_GRAPH.md, ARCHITECTURE.md §10
  # ---------------------------------------------------------------------------
  postgres:
    image: timescale/timescaledb:2.17.2-pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aegis}
      POSTGRES_USER: ${POSTGRES_USER:-aegis}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme_local_only}
    ports:
      - "127.0.0.1:${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aegis}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [aegis-net]

  neo4j:
    image: neo4j:5.24-community
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-changeme_local_only}
      NEO4J_PLUGINS: '["apoc"]'
    ports:
      - "127.0.0.1:${NEO4J_HTTP_PORT:-7474}:7474"
      - "127.0.0.1:${NEO4J_BOLT_PORT:-7687}:7687"
    volumes:
      - neo4j-data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [aegis-net]

  redis:
    image: redis:7.4-alpine
    # No --requirepass: tried it, reverted it -- every test fixture across the
    # agentic-orchestrator suite hardcodes a bare `redis://localhost:6379/0`
    # (see tests/test_agents/conftest.py and friends), and any already-running
    # service's Redis client was constructed before a password would exist.
    # Adding auth here is a real improvement but a cross-cutting one -- it
    # needs every hardcoded test URL updated and every live service restarted
    # in the same change, not a one-line compose edit. Flagged, not done.
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [aegis-net]

  redpanda:
    image: redpandadata/redpanda:v24.2.10
    command:
      - redpanda start
      - --smp 1
      - --overprovisioned
      - --node-id 0
      - --kafka-addr PLAINTEXT://0.0.0.0:9092
      - --advertise-kafka-addr PLAINTEXT://redpanda:9092
      - --schema-registry-addr 0.0.0.0:8081
    ports:
      - "9092:9092"
      - "8081:8081"
    volumes:
      - redpanda-data:/var/lib/redpanda/data
    networks: [aegis-net]

  mosquitto:
    image: eclipse-mosquitto:2.0
    ports:
      - "${MQTT_BROKER_PORT:-1883}:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks: [aegis-net]

  # ---------------------------------------------------------------------------
  # Edge / Ingestion — ARCHITECTURE.md §6.2, §17
  # ---------------------------------------------------------------------------
  ingestion-gateway:
    <<: *service-base
    build: { context: ../.., dockerfile: services/ingestion-gateway/Dockerfile }
    ports: ["${INGESTION_GATEWAY_PORT:-8002}:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      redpanda: { condition: service_started }
      mosquitto: { condition: service_started }

  # ---------------------------------------------------------------------------
  # Intelligence Layer — ARCHITECTURE.md §9, §13-16
  # ---------------------------------------------------------------------------
  anomaly-detection:
    <<: *service-base
    build: { context: ../.., dockerfile: services/anomaly-detection/Dockerfile }
    ports: ["${ANOMALY_DETECTION_PORT:-8003}:8000"]

  computer-vision:
    <<: *service-base
    build: { context: ../.., dockerfile: services/computer-vision/Dockerfile }
    ports: ["${COMPUTER_VISION_PORT:-8004}:8000"]

  predictive-risk-engine:
    <<: *service-base
    build: { context: ../.., dockerfile: services/predictive-risk-engine/Dockerfile }
    ports: ["${PREDICTIVE_RISK_ENGINE_PORT:-8005}:8000"]

  digital-twin:
    <<: *service-base
    build: { context: ../.., dockerfile: services/digital-twin/Dockerfile }
    ports: ["${DIGITAL_TWIN_PORT:-8006}:8000"]
    depends_on:
      postgres: { condition: service_healthy }
      neo4j: { condition: service_healthy }

  iot-simulator:
    <<: *service-base
    build: { context: ../.., dockerfile: services/iot-simulator/Dockerfile }
    ports: ["${IOT_SIMULATOR_PORT:-8014}:8000"]

  knowledge-graph:
    <<: *service-base
    build: { context: ../.., dockerfile: services/knowledge-graph/Dockerfile }
    ports: ["${KNOWLEDGE_GRAPH_PORT:-8007}:8000"]
    depends_on:
      neo4j: { condition: service_healthy }

  rag-service:
    <<: *service-base
    build: { context: ../.., dockerfile: services/rag-service/Dockerfile }
    ports: ["${RAG_SERVICE_PORT:-8008}:8000"]

  agentic-orchestrator:
    <<: *service-base
    build: { context: ../.., dockerfile: services/agentic-orchestrator/Dockerfile }
    ports: ["${AGENTIC_ORCHESTRATOR_PORT:-8009}:8000"]

  # ---------------------------------------------------------------------------
  # Application / Domain Services — ARCHITECTURE.md §8.1
  # ---------------------------------------------------------------------------
  incident-service:
    <<: *service-base
    build: { context: ../.., dockerfile: services/incident-service/Dockerfile }
    ports: ["${INCIDENT_SERVICE_PORT:-8010}:8000"]

  notification-service:
    <<: *service-base
    build: { context: ../.., dockerfile: services/notification-service/Dockerfile }
    ports: ["${NOTIFICATION_SERVICE_PORT:-8011}:8000"]

  identity-rbac:
    <<: *service-base
    build: { context: ../.., dockerfile: services/identity-rbac/Dockerfile }
    ports: ["${IDENTITY_RBAC_PORT:-8012}:8000"]

  audit-log:
    <<: *service-base
    build: { context: ../.., dockerfile: services/audit-log/Dockerfile }
    ports: ["${AUDIT_LOG_PORT:-8013}:8000"]

  # ---------------------------------------------------------------------------
  # Experience Layer — ARCHITECTURE.md §11
  # ---------------------------------------------------------------------------
  api-gateway:
    <<: *service-base
    build: { context: ../.., dockerfile: services/api-gateway/Dockerfile }
    ports: ["${API_GATEWAY_PORT:-8000}:8000"]
    depends_on:
      identity-rbac: { condition: service_started }

  realtime-gateway:
    <<: *service-base
    build: { context: ../.., dockerfile: services/realtime-gateway/Dockerfile }
    ports: ["${REALTIME_GATEWAY_PORT:-8001}:8000"]

networks:
  aegis-net:
    driver: bridge

volumes:
  postgres-data:
  neo4j-data:
  redis-data:
  redpanda-data:
